name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: |
          cd backend
          railway up --detach --service backend --environment production

      - name: Deploy frontend
        run: |
          cd frontend
          railway up --detach --service frontend --environment production

      - name: Wait for deploys to build
        run: sleep 60

      - name: Health check
        run: |
          echo "=== Backend ==="
          BACKEND_STATUS=$(curl -s -o /tmp/be.txt -w "%{http_code}" \
            "https://backend-production-2161.up.railway.app/api/info" --max-time 15 2>&1) || BACKEND_STATUS="timeout"
          echo "HTTP: $BACKEND_STATUS"
          cat /tmp/be.txt 2>/dev/null | head -5
          echo ""
          echo "=== Frontend (ireska.com) ==="
          FE_STATUS=$(curl -s -o /tmp/fe.txt -w "%{http_code}" \
            "https://ireska.com/" --max-time 15 2>&1) || FE_STATUS="timeout"
          echo "HTTP: $FE_STATUS"
          echo ""
          echo "=== Health endpoint ==="
          HEALTH=$(curl -s "https://ireska.com/api/health" --max-time 15 2>&1) || HEALTH="unreachable"
          echo "$HEALTH"
