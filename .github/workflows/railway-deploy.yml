name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: |
          cd backend
          railway up --service backend --environment production
        timeout-minutes: 10

      - name: Verify backend health
        run: |
          echo "Waiting 30s for backend to start..."
          sleep 30
          BACKEND_URL=$(cd backend && railway variables --service backend --environment production 2>/dev/null | grep RAILWAY_PUBLIC_DOMAIN | head -1 | awk '{print $NF}' || echo "")
          if [ -n "$BACKEND_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${BACKEND_URL}/api/info" || echo "000")
            echo "Backend health check: HTTP $STATUS"
            if [ "$STATUS" = "403" ] || [ "$STATUS" = "000" ]; then
              echo "::warning::Backend may not be healthy (HTTP $STATUS)"
            fi
          else
            echo "Could not determine backend URL"
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend
        run: |
          cd frontend
          railway up --service frontend --environment production
        timeout-minutes: 10

      - name: Verify frontend health
        run: |
          echo "Waiting 30s for frontend to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://ireska.com/" || echo "000")
          echo "Frontend health check (ireska.com): HTTP $STATUS"
          if [ "$STATUS" = "403" ] || [ "$STATUS" = "000" ]; then
            echo "::warning::Frontend may not be healthy (HTTP $STATUS)"
          fi
          # Also check health endpoint
          HEALTH=$(curl -s "https://ireska.com/api/health" 2>/dev/null || echo "unreachable")
          echo "Health endpoint: $HEALTH"
