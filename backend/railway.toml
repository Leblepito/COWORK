# COWORK.ARMY v7.0 — Backend Service (Railway)
# NOTE: If using rootDirectory=backend on Railway, this file is used.
# But the recommended approach is rootDirectory=(empty) with Dockerfile.backend at repo root.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/info"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
