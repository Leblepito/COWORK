# COWORK.ARMY v7.0 — Frontend Service (Railway)
# Root Dockerfile builds frontend/ as Next.js standalone
# Backend uses Dockerfile.backend from the same repo

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
